<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Folder Fixer</title>
    <style>
        :root {
            --bg-color: #090a0f;         
            --surface-color: #13151f;    
            --card-color: #1b1e2b;       
            --text-main: #f3f4f6;        
            --text-muted: #858aa0;       
            --accent-color: #dfbb6c;     
            --accent-hover: #cfa856;
            --border-color: #242838;     
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: var(--surface-color);
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 10;
        }

        .header-title-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 8px;
        }

        h2 { 
            margin: 0; font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text-main); 
        }

        .action-buttons { display: flex; gap: 8px; }

        .btn {
            padding: 10px 14px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-outline:active { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        
        .btn-gold { background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .btn-gold:active { background: rgba(223, 187, 108, 0.1); }

        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-primary:active { background: var(--accent-hover); }
        .btn-run { background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .btn-run:active { background: rgba(223, 187, 108, 0.1); }

        .search-container { 
            margin-top: 14px; 
            width: 100%; 
            display: flex; 
            gap: 8px; 
            align-items: stretch; 
        }
        
        .search-input {
            flex: 1; min-width: 0; padding: 12px 16px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-size: 0.9rem; outline: none; transition: border-color 0.2s ease;
        }
        
        .search-input:focus { border-color: var(--accent-color); }

        .app-list { flex: 1; overflow-y: auto; padding: 16px 12px; }
        .app-item {
            display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background-color: var(--surface-color); margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border-color); transition: transform 0.1s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        .app-item:active { background-color: var(--card-color); border-color: #3b415a; }
        .app-details { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        
        .app-name {
            font-size: 1.05rem; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); letter-spacing: -0.01em;
        }

        .app-codename {
            font-size: 0.8rem; margin: 4px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Courier New', Courier, monospace;
            color: #e5e7eb;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
        }

        .checkbox-container {
            position: relative; width: 22px; height: 22px; cursor: pointer; user-select: none; margin-left: 16px; flex-shrink: 0;
        }
        .checkbox-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark {
            position: absolute; top: 0; left: 0; height: 22px; width: 22px; background-color: var(--bg-color); border-radius: 6px; border: 2px solid var(--accent-color); transition: all 0.2s ease;
        }
        .checkbox-container input:checked ~ .checkmark { background-color: var(--accent-color); border-color: var(--accent-color); }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }
        .checkbox-container .checkmark:after {
            left: 6px; top: 2px; width: 5px; height: 10px; border: solid #000; border-width: 0 3px 3px 0; transform: rotate(45deg);
        }

        .debug-panel { margin-top: auto; border-top: 1px solid var(--border-color); background-color: #050608; display: flex; flex-direction: column; }
        .debug-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #0b0c12; border-bottom: 1px solid var(--border-color); }
        .debug-title { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.05em; }
        .console-actions { display: flex; gap: 6px; }
        
        .btn-console {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 4px; padding: 4px 10px; font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-console:active { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        .btn-clear-logs:hover { border-color: #ef4444; color: #ef4444; }

        #log-output {
            display: none; padding: 12px 16px; font-family: monospace; font-size: 0.75rem; white-space: pre-wrap; max-height: 140px; overflow-y: auto; opacity: 0.9; border-top: 1px solid var(--border-color);
        }
        
        .loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.9rem;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title-row">
            <h2>App Folder Fixer</h2>
            <div class="action-buttons">
                <button class="btn btn-gold" id="btn-select-all">Select All</button>
                <button class="btn btn-gold" id="btn-clear-all">Clear All</button>
            </div>
        </div>
        
        <div class="action-buttons" style="width: 100%; display: flex;">
            <button class="btn btn-primary" id="btn-save-config" style="flex: 1;">Save Config</button>
            <button class="btn btn-run" id="btn-run-fixer" style="flex: 1;">Run Fixer</button>
        </div>

        <div class="search-container">
            <button class="btn btn-gold" id="btn-reload">🔄 Reload</button>
            <input type="text" id="search-bar" class="search-input" placeholder="Search app name or package...">
        </div>
    </header>

    <main class="app-list" id="app-list"></main>

    <section class="debug-panel">
        <div class="debug-header">
            <span class="debug-title">SYSTEM DIAGNOSTIC CONSOLE</span>
            <div class="console-actions">
                <button class="btn-console" id="toggle-log-btn">Show Logs</button>
                <button class="btn-console" id="btn-copy-logs">Copy Logs</button>
                <button class="btn-console btn-clear-logs" id="btn-clear-logs">Clear</button>
            </div>
        </div>
        <div id="log-output"></div>
    </section>

    <script type="module">
        import { listPackages, getPackagesInfo, exec, toast } from './kernelsu.js';

        const CONFIG_PATH = "/data/adb/modules/folder-fixer/folder_fixer.txt";
        const MODULE_ID = "folder-fixer";

        let userApps = [];
        let selectedPackages = new Set();
        let searchQuery = "";

        function log(msg, level = 'INFO') {
            const logBox = document.getElementById('log-output');
            if (!logBox) return;
            const time = new Date().toLocaleTimeString();
            let color = "#a7f3d0"; 
            if (level === 'ERROR') color = "#ef4444"; 
            else if (level === 'WARN') color = "#fbbf24"; 
            else if (level === 'SUCCESS') color = "#34d399"; 
            const span = document.createElement('span');
            span.style.color = color;
            span.style.display = 'block';
            span.innerText = `[${time}] [${level}] ${msg}`;
            logBox.appendChild(span);
            if (logBox.style.display === 'block') logBox.scrollTop = logBox.scrollHeight;
        }

        function clearLogs() { 
            document.getElementById('log-output').innerHTML = ''; 
        }

        function toggleLogVisibility() {
            const logBox = document.getElementById('log-output');
            const btn = document.getElementById('toggle-log-btn');
            if (logBox.style.display === 'block') {
                logBox.style.display = 'none'; btn.innerText = 'Show Logs';
            } else {
                logBox.style.display = 'block'; btn.innerText = 'Hide Logs';
                logBox.scrollTop = logBox.scrollHeight;
            }
        }

        function copyLogs() {
            const logBox = document.getElementById('log-output');
            if (!logBox || !logBox.innerText) { 
                toast("No logs available to copy."); 
                return; 
            }
            navigator.clipboard.writeText(logBox.innerText)
                .then(() => { toast("Logs copied!"); })
                .catch(() => {
                    const ta = document.createElement("textarea"); ta.value = logBox.innerText;
                    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
                    document.body.removeChild(ta);
                    toast("Logs copied!");
                });
        }

        function handleSearch() {
            const searchBar = document.getElementById('search-bar');
            if (searchBar) { 
                searchQuery = searchBar.value.toLowerCase().trim(); 
                renderList(); 
            }
        }

        const generateFallbackName = (pkg) => {
            const parts = pkg.split('.');
            let fallback = parts[parts.length - 1];
            const ignoreList = ['android', 'app', 'mobile', 'id', 'com', 'native', 'lite', 'pro'];
            if (ignoreList.includes(fallback.toLowerCase()) && parts.length > 1) {
                fallback = parts[parts.length - 2];
            }
            return fallback.charAt(0).toUpperCase() + fallback.slice(1);
        };

        async function waitForKernelSUCache() {
            const maxAttempts = 35;
            let lastLength = -1;
            let consecutiveStableMatches = 0;

            for (let i = 0; i < maxAttempts; i++) {
                let currentPkgs = [];
                try {
                    currentPkgs = listPackages('user');
                } catch (e) {}

                if (currentPkgs && currentPkgs.length > 0) {
                    if (currentPkgs.length === lastLength) {
                        consecutiveStableMatches++;
                        if (consecutiveStableMatches >= 2) {
                            return currentPkgs;
                        }
                    } else {
                        consecutiveStableMatches = 0;
                        lastLength = currentPkgs.length;
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            try {
                return listPackages('user');
            } catch (e) {
                return [];
            }
        }

        async function loadApps() {
            clearLogs();
            const listDiv = document.getElementById('app-list');
            if (listDiv) {
                listDiv.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Loading installed apps and package names... Please wait.</div>
                    </div>
                `;
            }

            try {
                if (typeof ksu === 'undefined') {
                    throw new Error("KernelSU API missing. Make sure you are running this inside the KernelSU Manager.");
                }

                let pkgs = await waitForKernelSUCache();

                if (!pkgs || pkgs.length === 0) {
                    log("No apps found.", "ERROR");
                    if (listDiv) listDiv.innerHTML = '<div class="loading">No apps found. Please check your system.</div>';
                    return;
                }

                log(`Loaded ${pkgs.length} apps.`, "SUCCESS");

                let infoArr = [];
                try {
                    infoArr = getPackagesInfo(pkgs);
                } catch (e) {}

                userApps = infoArr.map(info => {
                    let cleanName = info.appLabel;
                    if (!cleanName || cleanName === info.packageName) {
                        cleanName = generateFallbackName(info.packageName);
                    }
                    return { packageName: info.packageName, appName: cleanName };
                });
                
                const configRes = await exec(`cat "${CONFIG_PATH}" 2>/dev/null`);
                
                selectedPackages.clear();
                if (configRes.errno === 0 && configRes.stdout && configRes.stdout.trim().length > 0) {
                    configRes.stdout.split("\n").forEach(line => {
                        let t = line.trim(); 
                        if (!t || t.startsWith('#')) return;
                        let clean = t.startsWith('package:') ? t.replace('package:', '').trim() : t;
                        if (clean.includes('.')) selectedPackages.add(clean);
                    });
                    log(`Restored ${selectedPackages.size} saved apps from configuration.`, "SUCCESS");
                }
                
                renderList();
            } catch (err) { 
                log(`Error loading apps: ${err.message || err}`, "ERROR"); 
                if (listDiv) listDiv.innerHTML = '<div class="loading">Error loading apps. Check logs.</div>';
            }
        }

        function selectAll(check) {
            userApps.forEach(app => {
                if (!searchQuery || app.appName.toLowerCase().includes(searchQuery) || app.packageName.toLowerCase().includes(searchQuery)) {
                    if (check) {
                        selectedPackages.add(app.packageName);
                    } else {
                        selectedPackages.delete(app.packageName);
                    }
                }
            });
            renderList();
        }

        function togglePackage(pkg) {
            if (selectedPackages.has(pkg)) {
                selectedPackages.delete(pkg);
            } else {
                selectedPackages.add(pkg);
            }
            renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('app-list');
            if (!listDiv) return;
            listDiv.innerHTML = '';
            
            let filtered = userApps.filter(app => !searchQuery || app.appName.toLowerCase().includes(searchQuery) || app.packageName.toLowerCase().includes(searchQuery));
            
            filtered.sort((a, b) => {
                return a.appName.localeCompare(b.appName, undefined, { numeric: true, sensitivity: 'base' });
            });

            if (filtered.length === 0) {
                listDiv.innerHTML = `
                    <div class="loading">
                        <div style="margin-bottom: 14px;">No apps match your search.</div>
                        <button class="btn btn-gold" id="btn-empty-reload">Reload App List</button>
                    </div>
                `;
                document.getElementById('btn-empty-reload').addEventListener('click', clearSearchAndReload);
                return;
            }

            const frag = document.createDocumentFragment();
            filtered.forEach(app => {
                const pkg = app.packageName;
                const item = document.createElement('div');
                item.className = 'app-item';
                item.setAttribute('data-package-id', pkg);
                item.innerHTML = `
                    <div class="app-details">
                        <p class="app-name">${app.appName}</p>
                        <p class="app-codename">${pkg}</p>
                    </div>
                    <label class="checkbox-container" style="pointer-events: none;">
                        <input type="checkbox" value="${pkg}" ${selectedPackages.has(pkg) ? 'checked' : ''}>
                        <span class="checkmark"></span>
                    </label>
                `;
                frag.appendChild(item);
            });
            listDiv.appendChild(frag);
        }

        async function clearSearchAndReload() {
            const searchBar = document.getElementById('search-bar');
            if (searchBar) searchBar.value = "";
            searchQuery = "";
            await loadApps();
        }

        async function saveConfig(showFeedback = true) {
            if (typeof ksu === 'undefined') return false;
            
            let content = "# App Folder Fixer User Configuration\n" +
                          "# Add package names below (one per line) that need folder fixes.\n" +
                          "# Example:\n" +
                          "# com.epicgames.portal\n" +
                          "# com.activision.callofduty.shooter\n" +
                          "# Remove '#' to enable an entry. Lines starting with '#' are treated as comments.\n\n";
                          
            Array.from(selectedPackages).sort().forEach(p => content += `${p}\n`);

            try {
                const b64 = btoa(unescape(encodeURIComponent(content)));
                const cmd = `mkdir -p /data/adb/modules/folder-fixer && echo "${b64}" | base64 -d > "${CONFIG_PATH}" && chmod 666 "${CONFIG_PATH}"`;
                
                const res = await exec(cmd);
                
                if (res.errno === 0) {
                    if (showFeedback) { 
                        toast("Config Saved!"); 
                        log(`Configuration saved successfully (${selectedPackages.size} apps).`, "SUCCESS"); 
                    }
                    return true;
                }
                log("Save failed. Check module write permissions.", "ERROR");
                return false;
            } catch (err) { 
                log(`Save error: ${err}`, "ERROR"); 
                return false; 
            }
        }

        async function runFixer() {
            if (typeof ksu === 'undefined') {
                log("Fixer aborting: No root access detected.", "ERROR");
                return;
            }

            const saveOk = await saveConfig(false);
            if (!saveOk) { 
                log("Fixer aborting: Config save failed.", "ERROR"); 
                return; 
            }

            if (selectedPackages.size === 0) {
                log("No apps selected.", "WARN");
                toast("No apps selected!"); 
                return;
            }

            log(`Executing fixer script for ${selectedPackages.size} selected apps...`, "INFO");
            try {
                const res = await exec(`sh /data/adb/modules/${MODULE_ID}/action.sh`);
                
                if (res.stdout) {
                    log("Script response:\n" + res.stdout, "INFO");
                }
                if (res.stderr) {
                    log("Script warnings/errors:\n" + res.stderr, "WARN");
                }
                
                log("Fixer script execution finished.", "SUCCESS");
                toast("Folder Check Complete!");
            } catch (e) { 
                log(`Script runtime error: ${e}`, "ERROR"); 
            }
        }

        async function lifecycleInitializer() {
            for (let i = 0; i < 20; i++) {
                if (typeof ksu !== 'undefined') break;
                await new Promise(r => setTimeout(r, 75));
            }
            loadApps();
        }
        
        document.getElementById('btn-select-all').addEventListener('click', () => selectAll(true));
        document.getElementById('btn-clear-all').addEventListener('click', () => selectAll(false));
        document.getElementById('btn-save-config').addEventListener('click', () => saveConfig(true));
        document.getElementById('btn-run-fixer').addEventListener('click', runFixer);
        document.getElementById('btn-reload').addEventListener('click', clearSearchAndReload);
        document.getElementById('search-bar').addEventListener('input', handleSearch);
        document.getElementById('toggle-log-btn').addEventListener('click', toggleLogVisibility);
        document.getElementById('btn-copy-logs').addEventListener('click', copyLogs);
        document.getElementById('btn-clear-logs').addEventListener('click', clearLogs);

        document.getElementById('app-list').addEventListener('click', (e) => {
            const targetItem = e.target.closest('.app-item');
            if (!targetItem) return;
            
            const pkg = targetItem.getAttribute('data-package-id');
            const checkbox = targetItem.querySelector('input[type="checkbox"]');
            
            checkbox.checked = !checkbox.checked;
            togglePackage(pkg);
        });

        window.addEventListener('DOMContentLoaded', lifecycleInitializer);
    </script>
</body>
</html>
